body:
  text: 西藏宗喀巴大士造民國赴藏學法僧超一譯諸善樂本勝妙主如理依止利樂生不爾善資根本斷知識如理依加被善知識攝真實佛於是知已於過患分別心滅功德品無量恩惠得加被意樂信仰極恭敬加行身命諸受用特別如諭行供養惟是歡悅得加被無瑕內外順緣滿別解雙運諸能生當來難得作此身堅實清淨得加被死仇決定來無疑今時即來即有此遠離死時決定益修行妙法得加被從無始時集惡業死無自在於惡趣生已所納冷熱等難忍諸苦念加被大怖救怙皈依主無別不欺勝三寶堅實皈依學粗細於諸學處學加被黑白業果苦樂二斷惡修善各各受從無始集罪與墮對治四力依加被世間善因能勤勞唯一次得天趣位受樂苦性未超越離輪回心生加被有不自在能迫者業惑二種業亦惑依己能起仇煩惱勤勞對治依加被業惑自在生死處接生相續縛若離無漏安樂受領納猛勵求解生加被解脫有故依三學最勝功德善稱讚出家淨戒一切時護如眼珠得加被唯是勤勞得解脫自利圓滿亦不成二利圓滿契勝道住於大乘道加被現在怨親各各非怨親各各不一定分類貪瞋不能作於諸等捨生加被漂流生死從無始於胎生者亦無始是故一切有情母知者知母生加被若曾作母此時母盡其育護極珍惜以諸養育無方設恩惠養育念加被如是恩惠具應知我若棄捨比下劣是故報達解脫苦最勝安樂令加被諸恩惠母安樂乏我身命受諸善樂施諸衆生利樂資當願具有成加被諸衆生樂無陋具并諸苦根唯遠離我能決定應作戾如是迅速能加被自他二利任運成正等正覺除無別是故為利諸衆生即是迅速得加被自他二苦不欲求欲求安樂能平等我欲安樂他亦樂自他平等持加被我執珍愛苦之因諸他執愛諸具根劣勝差別從此生是故自他換加被我之善樂諸因果他苦因果無餘者乘風取捨聖密言勝菩提心生加被發心增上不失壞勝利心念六次生黑法四去白法四如理勤勞依加被如是自他立宗趣發願迅速究竟故契入受戒高貴行猛勵精進學加被於諸衆生身受用三時諸善各隨欲真實轉變捨聖言捨心廣大增加被別解脫戒防惡行知逢命難不作犯雖然遮性罪微細慚愧不逸具加被情及無情災害等不欲衆苦所壓迫離瞋不忍於業果縱現忍受得加被修行菩提為利他無量難行似劫海於行精進及無疲著大堅海得加被正念堅固攝掉妄遮彼所緣置一心輕安引生身心善隨欲令住攝加被諸法諸之實性理見各觀察之般若審察力能引輕安甚深勝觀生加被由施有情攝眷屬同法愛語善利行自亦及彼同事行四攝利他行加被如是共道心純熟器成具相阿闍黎最上祕密無上乘契四灌頂得加被爾時給受真言教若守容易悉地成不守決得地獄燒比命珍惜守加被中庸中陰者三陰謂柔道果之二時法報化三速能成第一次第生加被業風當心不毀壞互入幻身明雙運現身成就二次道賢行圓滿得加被根如明弓金剛身俱生樂空無別心合一雙運金剛持穩速證得此加被
